<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaaaaa"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
  </defs>
  <!-- Background is transparent -->
  <g filter="url(#drop)" stroke="url(#metal)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Diagonal wires forming diamonds -->
    <path d="M0,20 L20,0 L40,20 L20,40 Z"/>
    <path d="M-20,20 L0,0 L20,20 L0,40 Z"/>
    <path d="M20,20 L40,0 L60,20 L40,40 Z"/>
    <path d="M0,60 L20,40 L40,60 L20,80 Z"/>
    <path d="M0,-20 L20,-40 L40,-20 L20,0 Z"/>
    
    <!-- Wire twist knuckles/joints -->
    <circle cx="20" cy="0" r="2.5" fill="#888" stroke="#fff" stroke-width="0.8"/>
    <circle cx="0" cy="20" r="2.5" fill="#888" stroke="#fff" stroke-width="0.8"/>
    <circle cx="40" cy="20" r="2.5" fill="#888" stroke="#fff" stroke-width="0.8"/>
    <circle cx="20" cy="40" r="2.5" fill="#888" stroke="#fff" stroke-width="0.8"/>
  </g>
</svg>
